<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCars SuperAdmin — Accesso</title>
    <link rel="stylesheet" href="/assets/css/admin.css">
    <style>
        body.login-page {
            display:flex; align-items:center; justify-content:center;
            min-height:100vh;
            background:linear-gradient(135deg,#0a0a1a 0%,#1a1a2e 60%,#16213e 100%);
        }
        .login-card { border-top:3px solid #6c3483; }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="#6c3483"/>
                <path d="M8 26 L14 14 L20 22 L26 14 L32 26" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="20" cy="12" r="3" fill="#fff"/>
            </svg>
        </div>
        <h1 class="login-title">SuperAdmin</h1>
        <p class="login-subtitle">Accesso riservato</p>

        <form class="login-form" id="loginForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" name="username"
                       autocomplete="username" required autofocus placeholder="superadmin">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password"
                       autocomplete="current-password" required placeholder="••••••••">
            </div>
            <div class="login-error" id="loginError" role="alert" hidden></div>
            <button type="submit" class="login-submit" id="submitBtn">
                <span id="submitLabel">Accedi</span>
                <span id="submitSpinner" hidden>Accesso in corso…</span>
            </button>
        </form>
    </div>

    <script>
    (function () {
        const form    = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        const label   = document.getElementById('submitLabel');
        const spinner = document.getElementById('submitSpinner');
        const btn     = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.hidden = true;
            btn.disabled = true; label.hidden = true; spinner.hidden = false;

            const body = new URLSearchParams({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            });

            try {
                const res = await fetch('/api/superadmin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body.toString(),
                    credentials: 'same-origin',
                });
                if (res.ok) { location.href = '/superadmin/index.html'; return; }
                const data = await res.json().catch(() => null);
                errorEl.textContent = data?.message ?? 'Credenziali non valide.';
                errorEl.hidden = false;
            } catch {
                errorEl.textContent = 'Errore di rete.';
                errorEl.hidden = false;
            } finally {
                btn.disabled = false; label.hidden = false; spinner.hidden = true;
            }
        });
    })();
    </script>
</body>
</html>
