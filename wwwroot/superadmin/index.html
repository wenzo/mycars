<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCars SuperAdmin</title>
    <link rel="stylesheet" href="/assets/css/admin.css">
    <style>
        :root { --accent: #6c3483; }
        .sidebar { border-top: 3px solid var(--accent); }
        .sidebar-brand-name { color: var(--accent) !important; }
        .status-badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600; }
        .status-pending  { background:#fef3c7; color:#92400e; }
        .status-approved { background:#d1fae5; color:#065f46; }
        .status-rejected { background:#fee2e2; color:#991b1b; }
        .detail-overlay  { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; align-items:center; justify-content:center; }
        .detail-overlay.open { display:flex; }
        .detail-modal    { background:#fff; border-radius:10px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:28px; }
        .detail-row      { display:flex; gap:8px; margin-bottom:10px; font-size:14px; }
        .detail-row dt   { color:var(--text-light); min-width:130px; flex-shrink:0; }
        .detail-row dd   { margin:0; color:var(--text); word-break:break-word; }
        .tabs            { display:flex; gap:2px; margin-bottom:20px; border-bottom:2px solid var(--border); }
        .tab             { padding:8px 18px; cursor:pointer; font-size:14px; font-weight:500; color:var(--text-mid); border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-2px; }
        .tab.active      { color:var(--accent); border-bottom-color:var(--accent); }
    </style>
</head>
<body>

<script src="/assets/js/layout-superadmin.js"></script>

<div class="main-wrapper">
    <header class="topbar">
        <button class="topbar-btn" id="hamburgerBtn" aria-label="Apri menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title" id="pageTitle">Operatori attivi</h1>
        <div class="topbar-spacer"></div>
    </header>
    <main class="content">

        <!-- Stats -->
        <div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:24px">
            <div class="stat-card stat-amber">
                <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                <div class="stat-body"><span class="stat-value" id="statPending">—</span><span class="stat-label">In attesa</span></div>
            </div>
            <div class="stat-card stat-green">
                <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="20 6 9 17 4 12"/></svg></div>
                <div class="stat-body"><span class="stat-value" id="statApproved">—</span><span class="stat-label">Approvate</span></div>
            </div>
            <div class="stat-card stat-indigo">
                <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                <div class="stat-body"><span class="stat-value" id="statOperators">—</span><span class="stat-label">Operatori attivi</span></div>
            </div>
        </div>

        <!-- Tabs (visibili solo nella sezione Iscrizioni) -->
        <div class="tabs" id="tabsBar" style="display:none">
            <button class="tab active" id="tabPending"   data-status="pending">In attesa</button>
            <button class="tab"         id="tabApprovedT" data-status="approved">Approvate</button>
            <button class="tab"         id="tabRejected"  data-status="rejected">Rifiutate</button>
        </div>

        <!-- Registrations table -->
        <div class="card" id="regPanel" style="display:none">
            <div class="card-body" style="padding:0">
                <table class="table" id="regTable">
                    <thead>
                        <tr>
                            <th>Ragione sociale</th>
                            <th>Referente</th>
                            <th>Email</th>
                            <th>Città</th>
                            <th>Data</th>
                            <th>Stato</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="regBody">
                        <tr><td colspan="7" style="text-align:center;color:var(--text-light);padding:32px">Caricamento…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Utility panel: brands CRUD -->
        <div id="utilityPanel" style="display:none">

            <div class="card">
                <div class="card-header" style="justify-content:space-between">
                    <h2 class="card-title">Marchi veicoli</h2>
                    <div style="display:flex;gap:10px;align-items:center">
                        <div class="search-bar" style="width:220px">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="brandSearch" placeholder="Cerca marchio…">
                        </div>
                        <select id="brandTypeFilter" class="form-select" style="height:40px;font-size:13px;width:auto">
                            <option value="">Tutti i tipi</option>
                            <option value="autovettura">Autovettura</option>
                            <option value="motoveicolo">Motoveicolo</option>
                            <option value="autocarro">Autocarro</option>
                            <option value="autocaravan">Autocaravan</option>
                        </select>
                        <button class="btn btn-primary btn-sm" id="addBrandBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Aggiungi
                        </button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Marchio</th>
                                <th>Tipi veicolo</th>
                                <th style="width:100px"></th>
                            </tr>
                        </thead>
                        <tbody id="brandsTableBody">
                            <tr><td colspan="3" style="text-align:center;color:var(--text-light);padding:32px">Caricamento…</td></tr>
                        </tbody>
                    </table>
                </div>
                <div style="padding:12px 20px;border-top:1px solid var(--border);font-size:13px;color:var(--text-light)" id="brandsCount"></div>
            </div>

        </div>

        <!-- Operators table -->
        <div class="card" id="opPanel">
            <div class="card-body" style="padding:0">
                <table class="table" id="opTable">
                    <thead>
                        <tr><th>Ragione sociale</th><th>Slug</th><th>Email</th><th>Stato</th><th>Creato il</th><th></th></tr>
                    </thead>
                    <tbody id="opBody">
                        <tr><td colspan="6" style="text-align:center;color:var(--text-light);padding:32px">Caricamento…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- Brand drawer -->
<div class="drawer-overlay" id="brandDrawerOverlay"></div>
<aside class="drawer" id="brandDrawer" aria-label="Aggiungi / Modifica marchio">
    <div class="drawer-header">
        <span class="drawer-title" id="brandDrawerTitle">Aggiungi marchio</span>
        <button class="drawer-close" id="brandDrawerClose" aria-label="Chiudi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="drawer-body">
        <form id="brandForm" style="display:flex;flex-direction:column;gap:20px">
            <div class="form-group">
                <label class="form-label" for="bfName">Nome marchio <span style="color:var(--red)">*</span></label>
                <input class="form-input" type="text" id="bfName" required placeholder="es. Volkswagen">
            </div>
            <div>
                <label class="form-label" style="display:block;margin-bottom:10px">Tipi veicolo <span style="color:var(--red)">*</span></label>
                <div style="display:flex;flex-direction:column;gap:10px">
                    <label class="form-check">
                        <input class="form-check-input" type="checkbox" name="bfType" value="autovettura">
                        <span class="form-check-label">
                            <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--blue);margin-right:6px;vertical-align:middle"></span>
                            Autovettura
                        </span>
                    </label>
                    <label class="form-check">
                        <input class="form-check-input" type="checkbox" name="bfType" value="motoveicolo">
                        <span class="form-check-label">
                            <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--amber);margin-right:6px;vertical-align:middle"></span>
                            Motoveicolo
                        </span>
                    </label>
                    <label class="form-check">
                        <input class="form-check-input" type="checkbox" name="bfType" value="autocarro">
                        <span class="form-check-label">
                            <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--indigo);margin-right:6px;vertical-align:middle"></span>
                            Autocarro
                        </span>
                    </label>
                    <label class="form-check">
                        <input class="form-check-input" type="checkbox" name="bfType" value="autocaravan">
                        <span class="form-check-label">
                            <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--green);margin-right:6px;vertical-align:middle"></span>
                            Autocaravan
                        </span>
                    </label>
                </div>
            </div>
            <div id="brandFormError" class="login-error"></div>
        </form>
    </div>
    <div class="drawer-footer" style="justify-content:space-between">
        <button type="button" class="btn btn-outline" id="brandDrawerDelete" style="color:var(--red);border-color:var(--red);display:none">Elimina</button>
        <div style="display:flex;gap:10px">
            <button type="button" class="btn btn-outline" id="brandDrawerCancel">Annulla</button>
            <button type="submit" form="brandForm" class="btn btn-primary">Salva</button>
        </div>
    </div>
</aside>

<!-- Detail modal -->
<div class="detail-overlay" id="detailOverlay">
    <div class="detail-modal">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
            <h2 style="margin:0;font-size:18px" id="modalTitle">Dettaglio richiesta</h2>
            <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-light)">✕</button>
        </div>
        <div id="modalBody"></div>
        <div id="modalActions" style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap"></div>
        <div class="login-error" id="modalError" style="margin-top:12px"></div>
    </div>
</div>

<script src="/assets/js/admin.js"></script>
<script>
'use strict';

let currentStatus = 'pending';
let currentRegId  = null;

async function loadStats() {
    try {
        const [all, operators] = await Promise.all([
            apiFetch('/api/superadmin/registrations'),
            apiFetch('/api/superadmin/operators'),
        ]);
        const pending  = all.filter(r => r.status === 'pending').length;
        const approved = all.filter(r => r.status === 'approved').length;
        document.getElementById('statPending').textContent   = pending;
        document.getElementById('statApproved').textContent  = approved;
        document.getElementById('statOperators').textContent = operators.length;
        const badge = document.getElementById('pendingBadge');
        if (pending > 0) { badge.textContent = pending; badge.style.display = ''; }
    } catch {}
}

async function loadRegistrations(status) {
    const tbody = document.getElementById('regBody');
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-light);padding:32px">Caricamento…</td></tr>';
    try {
        const list = await apiFetch(`/api/superadmin/registrations?status=${status}`);
        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-light);padding:32px">Nessuna richiesta.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(r => `
            <tr>
                <td style="font-weight:600">${esc(r.businessName)}</td>
                <td>${esc(r.contactPerson)}</td>
                <td>${esc(r.email)}</td>
                <td>${esc(r.city ?? '—')}</td>
                <td>${fmtDate(r.createdAt)}</td>
                <td><span class="status-badge status-${r.status}">${statusLabel(r.status)}</span></td>
                <td><button class="btn btn-outline btn-sm" onclick="openDetail('${r.id}')">Dettaglio</button></td>
            </tr>`).join('');
    } catch {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--red);padding:32px">Errore nel caricamento.</td></tr>';
    }
}

async function loadOperators() {
    const tbody = document.getElementById('opBody');
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-light);padding:32px">Caricamento…</td></tr>';
    try {
        const list = await apiFetch('/api/superadmin/operators');
        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-light);padding:32px">Nessun operatore.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(o => `
            <tr id="op-row-${o.id}">
                <td style="font-weight:600">${esc(o.businessName)}</td>
                <td><code>${esc(o.slug)}</code></td>
                <td>${esc(o.email ?? '—')}</td>
                <td id="op-status-${o.id}">
                    ${o.isActive
                        ? '<span class="status-badge status-approved">Attivo</span>'
                        : '<span class="status-badge status-rejected">Disabilitato</span>'}
                </td>
                <td>${fmtDate(o.createdAt)}</td>
                <td>
                    <button class="btn btn-outline btn-sm" onclick="toggleOperator('${o.id}', ${o.isActive})">
                        ${o.isActive ? 'Disabilita' : 'Abilita'}
                    </button>
                </td>
            </tr>`).join('');
    } catch {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--red);padding:32px">Errore nel caricamento.</td></tr>';
    }
}

async function openDetail(id) {
    currentRegId = id;
    document.getElementById('modalError').classList.remove('show');
    document.getElementById('modalBody').innerHTML = 'Caricamento…';
    document.getElementById('modalActions').innerHTML = '';
    document.getElementById('detailOverlay').classList.add('open');
    try {
        const r = await apiFetch(`/api/superadmin/registrations/${id}`);
        document.getElementById('modalTitle').textContent = r.businessName;
        document.getElementById('modalBody').innerHTML = `
            <dl style="margin:0">
                ${row('Ragione sociale', r.businessName)}
                ${row('P. IVA',          r.vatNumber)}
                ${row('Email',           r.email)}
                ${row('Telefono',        r.phone)}
                ${row('Referente',       r.contactPerson)}
                ${row('Indirizzo',       [r.address, r.city, r.province].filter(Boolean).join(', '))}
                ${row('Sito web',        r.website)}
                ${row('Note',            r.notes)}
                ${row('Stato',          `<span class="status-badge status-${r.status}">${statusLabel(r.status)}</span>`)}
                ${r.reviewNotes ? row('Note revisione', r.reviewNotes) : ''}
            </dl>`;

        const actions = document.getElementById('modalActions');
        if (r.status === 'pending') {
            actions.innerHTML = `
                <div style="flex:1">
                    <input class="form-input" type="text" id="reviewNotes" placeholder="Note (opzionale)">
                </div>
                <button class="btn btn-primary" onclick="approve()">Approva</button>
                <button class="btn btn-outline" style="color:var(--red);border-color:var(--red)" onclick="reject()">Rifiuta</button>`;
        }
    } catch {
        document.getElementById('modalBody').innerHTML = '<p style="color:var(--red)">Errore nel caricamento.</p>';
    }
}

function closeModal() {
    document.getElementById('detailOverlay').classList.remove('open');
    currentRegId = null;
}

async function approve() {
    if (!currentRegId) return;
    const notes = document.getElementById('reviewNotes')?.value.trim() || null;
    await reviewAction('approve', notes, 'Approvazione completata. Email inviata al concessionario.');
}

async function reject() {
    if (!currentRegId) return;
    const notes = document.getElementById('reviewNotes')?.value.trim() || null;
    if (!notes) {
        const errEl = document.getElementById('modalError');
        errEl.textContent = 'Inserisci una motivazione per il rifiuto.';
        errEl.classList.add('show');
        return;
    }
    await reviewAction('reject', notes, 'Richiesta rifiutata.');
}

async function reviewAction(action, notes, successMsg) {
    const errEl = document.getElementById('modalError');
    errEl.classList.remove('show');
    try {
        await apiFetch(`/api/superadmin/registrations/${currentRegId}/${action}`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ notes }),
        });
        closeModal();
        showToast(successMsg, 'success');
        loadStats();
        loadRegistrations(currentStatus);
    } catch {
        errEl.textContent = 'Si è verificato un errore. Riprova.';
        errEl.classList.add('show');
    }
}

async function toggleOperator(id, currentlyActive) {
    const action = currentlyActive ? 'disabilita' : 'abilita';
    if (!confirm(`Vuoi ${action} questo operatore?`)) return;

    try {
        const data = await apiFetch(`/api/superadmin/operators/${id}/set-active`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ isActive: !currentlyActive }),
        });

        const statusCell = document.getElementById(`op-status-${id}`);
        const btn        = statusCell?.closest('tr')?.querySelector('button');

        if (statusCell) {
            statusCell.innerHTML = data.isActive
                ? '<span class="status-badge status-approved">Attivo</span>'
                : '<span class="status-badge status-rejected">Disabilitato</span>';
        }
        if (btn) {
            btn.textContent = data.isActive ? 'Disabilita' : 'Abilita';
            btn.onclick = () => toggleOperator(id, data.isActive);
        }

        loadStats();
        showToast(`Operatore ${data.isActive ? 'abilitato' : 'disabilitato'}`, 'success');
    } catch {
        showToast('Errore durante l\'operazione', 'error');
    }
}

function row(label, value) {
    if (!value) return '';
    return `<div class="detail-row"><dt>${label}</dt><dd>${value}</dd></div>`;
}

function esc(s) {
    return (s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(s) {
    if (!s) return '—';
    return new Date(s).toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function statusLabel(s) {
    return { pending:'In attesa', approved:'Approvata', rejected:'Rifiutata' }[s] ?? s;
}

// ── Navigazione sidebar ───────────────────────────────────────────────────────

function showSection(section) {
    ['regPanel', 'opPanel', 'utilityPanel'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });
    document.querySelectorAll('.nav-item[data-section]').forEach(el => el.classList.remove('active'));
    const tabsBar = document.getElementById('tabsBar');

    if (section === 'iscrizioni') {
        tabsBar.style.display = '';
        document.getElementById('regPanel').style.display = '';
        document.getElementById('navIscrizioni').classList.add('active');
        document.getElementById('pageTitle').textContent  = 'Iscrizioni';
        const firstTab = tabsBar.querySelector('.tab');
        tabsBar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (firstTab) { firstTab.classList.add('active'); currentStatus = firstTab.dataset.status; }
        loadRegistrations(currentStatus);
    } else if (section === 'operatori') {
        tabsBar.style.display = 'none';
        document.getElementById('opPanel').style.display = '';
        document.getElementById('navOperatori').classList.add('active');
        document.getElementById('pageTitle').textContent = 'Operatori attivi';
        loadOperators();
    } else if (section === 'utility') {
        tabsBar.style.display = 'none';
        document.getElementById('utilityPanel').style.display = '';
        document.getElementById('navUtility').classList.add('active');
        document.getElementById('pageTitle').textContent      = 'Marchi veicoli';
        loadBrands();
    }
}

// ── Tab bar (Iscrizioni) ──────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = btn.dataset.status;
        loadRegistrations(currentStatus);
    });
});

// ── Brands CRUD ───────────────────────────────────────────────────────────────

const VT_CFG = {
    autovettura: { label: 'Autovettura', color: 'var(--blue)',   bg: 'var(--blue-bg)'   },
    motoveicolo: { label: 'Motoveicolo', color: 'var(--amber)',  bg: 'var(--amber-bg)'  },
    autocarro:   { label: 'Autocarro',   color: 'var(--indigo)', bg: 'var(--indigo-bg)' },
    autocaravan: { label: 'Autocaravan', color: 'var(--green)',  bg: 'var(--green-bg)'  },
};

let allBrands     = [];
let currentBrandId = null;

function vtBadge(vt) {
    const c = VT_CFG[vt] ?? { label: vt, color: 'var(--text-mid)', bg: 'var(--surface2)' };
    return `<span style="background:${c.bg};color:${c.color};border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600">${c.label}</span>`;
}

async function loadBrands() {
    const tbody   = document.getElementById('brandsTableBody');
    const countEl = document.getElementById('brandsCount');
    if (!tbody) return;
    try {
        allBrands = await apiFetch('/api/superadmin/brands');
        renderBrandsTable();
        if (countEl) countEl.textContent = `${allBrands.length} marchi totali`;
    } catch {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--red);padding:32px">Errore caricamento.</td></tr>';
    }
}

function renderBrandsTable() {
    const tbody      = document.getElementById('brandsTableBody');
    const search     = (document.getElementById('brandSearch')?.value ?? '').toLowerCase();
    const typeFilter = document.getElementById('brandTypeFilter')?.value ?? '';

    const filtered = allBrands.filter(b => {
        const nameOk = !search || b.name.toLowerCase().includes(search);
        const typeOk = !typeFilter || (b.vehicleTypes ?? []).includes(typeFilter);
        return nameOk && typeOk;
    });

    if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-light);padding:32px">Nessun marchio trovato.</td></tr>';
        return;
    }
    tbody.innerHTML = filtered.map(b => `
        <tr>
            <td style="font-weight:600">${esc(b.name)}</td>
            <td style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding-top:10px">
                ${(b.vehicleTypes ?? []).map(vtBadge).join('') || '<span style="color:var(--text-light);font-size:12px">—</span>'}
            </td>
            <td class="td-actions">
                <button class="btn btn-outline btn-sm" data-brand-edit="${b.id}">Modifica</button>
            </td>
        </tr>`).join('');
    tbody.querySelectorAll('[data-brand-edit]').forEach(btn =>
        btn.addEventListener('click', () => openBrandDrawer(btn.dataset.brandEdit)));
}

function openBrandDrawer(brandId = null) {
    currentBrandId = brandId;
    const title   = document.getElementById('brandDrawerTitle');
    const delBtn  = document.getElementById('brandDrawerDelete');
    const errEl   = document.getElementById('brandFormError');
    document.getElementById('brandForm')?.reset();
    if (errEl) errEl.classList.remove('show');
    if (title)  title.textContent    = brandId ? 'Modifica marchio' : 'Aggiungi marchio';
    if (delBtn) delBtn.style.display = brandId ? '' : 'none';

    if (brandId) {
        const brand = allBrands.find(b => b.id === brandId);
        if (brand) {
            document.getElementById('bfName').value = brand.name;
            document.querySelectorAll('input[name="bfType"]').forEach(cb => {
                cb.checked = (brand.vehicleTypes ?? []).includes(cb.value);
            });
        }
    }
    document.getElementById('brandDrawerOverlay')?.classList.add('open');
    document.getElementById('brandDrawer')?.classList.add('open');
}

function closeBrandDrawer() {
    document.getElementById('brandDrawerOverlay')?.classList.remove('open');
    document.getElementById('brandDrawer')?.classList.remove('open');
    currentBrandId = null;
}

async function saveBrand(e) {
    e.preventDefault();
    const errEl = document.getElementById('brandFormError');
    errEl.classList.remove('show');

    const name  = document.getElementById('bfName')?.value.trim() ?? '';
    const types = [...document.querySelectorAll('input[name="bfType"]:checked')].map(cb => cb.value);

    if (!name)         { errEl.textContent = 'Il nome è obbligatorio.';        errEl.classList.add('show'); return; }
    if (!types.length) { errEl.textContent = 'Seleziona almeno un tipo.';      errEl.classList.add('show'); return; }

    try {
        const payload = { name, vehicleTypes: types };
        if (currentBrandId) {
            await apiFetch(`/api/superadmin/brands/${currentBrandId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            showToast('Marchio aggiornato.', 'success');
        } else {
            await apiFetch('/api/superadmin/brands', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            showToast('Marchio creato.', 'success');
        }
        closeBrandDrawer();
        loadBrands();
    } catch (err) {
        errEl.textContent = err.message || 'Errore salvataggio.';
        errEl.classList.add('show');
    }
}

async function deleteBrand() {
    if (!currentBrandId) return;
    const brand = allBrands.find(b => b.id === currentBrandId);
    if (!confirm(`Eliminare il marchio "${brand?.name ?? ''}"? L'operazione non è reversibile.`)) return;
    try {
        await apiFetch(`/api/superadmin/brands/${currentBrandId}`, { method: 'DELETE' });
        showToast('Marchio eliminato.', 'success');
        closeBrandDrawer();
        loadBrands();
    } catch (err) {
        showToast(err.message || 'Errore eliminazione.', 'error');
    }
}

// ── Nav sidebar click ─────────────────────────────────────────────────────────

document.querySelectorAll('.nav-item[data-section]').forEach(el => {
    el.addEventListener('click', e => { e.preventDefault(); showSection(el.dataset.section); });
});

document.getElementById('addBrandBtn')        ?.addEventListener('click',  () => openBrandDrawer());
document.getElementById('brandDrawerClose')   ?.addEventListener('click',  closeBrandDrawer);
document.getElementById('brandDrawerCancel')  ?.addEventListener('click',  closeBrandDrawer);
document.getElementById('brandDrawerOverlay') ?.addEventListener('click',  closeBrandDrawer);
document.getElementById('brandDrawerDelete')  ?.addEventListener('click',  deleteBrand);
document.getElementById('brandForm')          ?.addEventListener('submit', saveBrand);

let bDebounce;
document.getElementById('brandSearch')?.addEventListener('input', () => {
    clearTimeout(bDebounce); bDebounce = setTimeout(renderBrandsTable, 200);
});
document.getElementById('brandTypeFilter')?.addEventListener('change', renderBrandsTable);

document.addEventListener('DOMContentLoaded', () => {
    loadStats();
    showSection('operatori');
});
</script>
</body>
