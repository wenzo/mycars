<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCars Admin — Sedi &amp; Reparti</title>
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

<script src="/assets/js/layout-admin.js"></script>

<div class="main-wrapper">
    <header class="topbar">
        <button class="topbar-btn" id="hamburgerBtn" aria-label="Apri menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title">Sedi &amp; Reparti</h1>
        <div class="topbar-spacer"></div>
        <button class="btn btn-primary btn-sm" id="addBranchBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Aggiungi sede
        </button>
    </header>
    <main class="content">

        <!-- ── Sedi ── -->
        <div class="card">
            <div class="filter-bar">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="branchSearch" type="text" placeholder="Cerca per nome, città…">
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome sede</th>
                            <th>Indirizzo</th>
                            <th>Città</th>
                            <th>Prov.</th>
                            <th>Coord.</th>
                            <th>Sede legale</th>
                            <th>Telefono</th>
                            <th>Attiva</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="branchesTableBody">
                        <tr><td colspan="9" style="text-align:center;color:var(--text-muted);padding:2.5rem">Caricamento…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ── Reparti ── -->
        <div class="card" style="margin-top:24px">
            <div class="filter-bar">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="deptSearch" type="text" placeholder="Cerca reparto…">
                </div>
                <div class="topbar-spacer"></div>
                <button class="btn btn-outline btn-sm" id="addDeptBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Aggiungi reparto
                </button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome reparto</th>
                            <th>Sede</th>
                            <th>Descrizione</th>
                            <th>Attivo</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="deptTableBody">
                        <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:2.5rem">Caricamento…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- ── Branch Drawer ──────────────────────────────────────────────────────────── -->
<div class="drawer-overlay" id="branchDrawerOverlay"></div>
<aside class="drawer" id="branchDrawer" aria-label="Aggiungi / Modifica sede">
    <div class="drawer-header">
        <span class="drawer-title" id="branchDrawerTitle">Aggiungi sede</span>
        <button class="drawer-close" id="branchDrawerClose" aria-label="Chiudi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="drawer-body">
        <form id="branchForm" style="display:flex;flex-direction:column;gap:20px">

            <div class="form-group">
                <label class="form-label" for="bName">Nome sede <span style="color:var(--red)">*</span></label>
                <input class="form-control" type="text" id="bName" placeholder="es. Sede centrale Milano" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="bLegalName">Ragione sociale</label>
                <input class="form-control" type="text" id="bLegalName" placeholder="es. MyCars S.r.l.">
            </div>

            <div class="form-group">
                <label class="form-label" for="bAddress">Indirizzo</label>
                <input class="form-control" type="text" id="bAddress" placeholder="Via Roma 1">
            </div>

            <div class="form-row" style="display:grid;grid-template-columns:1fr 120px 80px;gap:12px">
                <div class="form-group">
                    <label class="form-label" for="bCity">Città</label>
                    <input class="form-control" type="text" id="bCity" placeholder="Milano">
                </div>
                <div class="form-group">
                    <label class="form-label" for="bZip">CAP</label>
                    <input class="form-control" type="text" id="bZip" placeholder="20100">
                </div>
                <div class="form-group">
                    <label class="form-label" for="bProvince">Prov.</label>
                    <input class="form-control" type="text" id="bProvince" placeholder="MI" maxlength="2">
                </div>
            </div>

            <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group">
                    <label class="form-label" for="bPhone">Telefono</label>
                    <input class="form-control" type="tel" id="bPhone" placeholder="+39 02 1234567">
                </div>
                <div class="form-group">
                    <label class="form-label" for="bEmail">Email</label>
                    <input class="form-control" type="email" id="bEmail" placeholder="sede@esempio.it">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="bWhatsapp">WhatsApp</label>
                <input class="form-control" type="tel" id="bWhatsapp" placeholder="+39 333 1234567">
            </div>

            <div>
                <div class="form-section-title" style="margin-bottom:8px">Coordinate geografiche</div>
                <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:flex-end">
                    <div class="form-group" style="margin:0">
                        <label class="form-label" for="bLat">Latitudine</label>
                        <input class="form-control" type="number" id="bLat" step="any" placeholder="es. 45.4654219">
                    </div>
                    <div class="form-group" style="margin:0">
                        <label class="form-label" for="bLng">Longitudine</label>
                        <input class="form-control" type="number" id="bLng" step="any" placeholder="es. 9.1859243">
                    </div>
                    <button type="button" class="btn btn-outline btn-sm" id="bGeocodeBtn" title="Ottieni coordinate dall'indirizzo" style="height:40px;white-space:nowrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;margin-right:4px" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
                        Geocodifica
                    </button>
                </div>
                <p style="font-size:12px;color:var(--text-light);margin-top:5px">Compila indirizzo e città, poi clicca <em>Geocodifica</em> per ottenere le coordinate automaticamente.</p>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group">
                    <label class="form-label" for="bSortOrder">Ordine visualizzazione</label>
                    <input class="form-control" type="number" id="bSortOrder" value="0" min="0">
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:10px">
                <label class="form-check" style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:12px;background:var(--surface);border-radius:var(--r-sm);border:1.5px solid var(--border)" id="legalAddressToggle">
                    <input type="checkbox" id="bIsLegalAddress" style="width:18px;height:18px;margin-top:1px;accent-color:var(--navy);flex-shrink:0">
                    <div>
                        <span class="form-label" style="margin:0;display:block">Coincide con la sede legale</span>
                        <span style="font-size:12px;color:var(--text-light)">I dati di indirizzo verranno pre-compilati dalla sede legale in Impostazioni.</span>
                    </div>
                </label>
                <label class="form-check" style="display:flex;align-items:center;gap:10px;cursor:pointer">
                    <input type="checkbox" id="bActive" checked style="width:18px;height:18px;accent-color:var(--red)">
                    <span class="form-label" style="margin:0">Sede attiva</span>
                </label>
            </div>

        </form>
    </div>
    <div class="drawer-footer" style="justify-content:space-between">
        <button type="button" class="btn btn-outline" id="branchDrawerDelete" style="color:var(--red);border-color:var(--red);display:none">Elimina</button>
        <div style="display:flex;gap:10px">
            <button type="button" class="btn btn-outline" id="branchDrawerCancel">Annulla</button>
            <button type="submit" form="branchForm" class="btn btn-primary">Salva sede</button>
        </div>
    </div>
</aside>

<!-- ── Department Drawer ──────────────────────────────────────────────────────── -->
<div class="drawer-overlay" id="deptDrawerOverlay"></div>
<aside class="drawer" id="deptDrawer" aria-label="Aggiungi / Modifica reparto">
    <div class="drawer-header">
        <span class="drawer-title" id="deptDrawerTitle">Aggiungi reparto</span>
        <button class="drawer-close" id="deptDrawerClose" aria-label="Chiudi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="drawer-body">
        <form id="deptForm" style="display:flex;flex-direction:column;gap:20px">

            <div class="form-group">
                <label class="form-label" for="dName">Nome reparto <span style="color:var(--red)">*</span></label>
                <input class="form-control" type="text" id="dName" placeholder="es. Vendita Usato" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="dBranch">Sede</label>
                <select class="form-select" id="dBranch" style="height:40px">
                    <option value="">— Nessuna sede —</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="dDescription">Descrizione</label>
                <textarea class="form-control" id="dDescription" rows="3" placeholder="Descrizione opzionale del reparto" style="resize:vertical"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="dSortOrder">Ordine visualizzazione</label>
                <input class="form-control" type="number" id="dSortOrder" value="0" min="0" style="max-width:160px">
            </div>

            <label class="form-check" style="display:flex;align-items:center;gap:10px;cursor:pointer">
                <input type="checkbox" id="dActive" checked style="width:18px;height:18px;accent-color:var(--red)">
                <span class="form-label" style="margin:0">Reparto attivo</span>
            </label>

        </form>
    </div>
    <div class="drawer-footer" style="justify-content:space-between">
        <button type="button" class="btn btn-outline" id="deptDrawerDelete" style="color:var(--red);border-color:var(--red);display:none">Elimina</button>
        <div style="display:flex;gap:10px">
            <button type="button" class="btn btn-outline" id="deptDrawerCancel">Annulla</button>
            <button type="submit" form="deptForm" class="btn btn-primary">Salva reparto</button>
        </div>
    </div>
</aside>

<script src="/assets/js/admin.js"></script>
<script src="/assets/js/sedi.js"></script>
</body>
</html>
