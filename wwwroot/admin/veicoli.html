<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCars Admin — Veicoli</title>
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

<script src="/assets/js/layout-admin.js"></script>

<div class="main-wrapper">
    <header class="topbar">
        <button class="topbar-btn" id="hamburgerBtn" aria-label="Apri menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title">Veicoli</h1>
        <div class="topbar-spacer"></div>
        <button class="btn btn-primary btn-sm" id="addVehicleBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Aggiungi veicolo
        </button>
    </header>
    <main class="content">

        <div class="card">
            <div class="filter-bar">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="vehicleSearch" type="text" placeholder="Cerca per modello, codice…">
                </div>
                <select class="form-select" id="conditionFilter" style="height:40px;width:auto">
                    <option value="">Tutte le condizioni</option>
                    <option value="nuovo">Nuovo</option>
                    <option value="usato">Usato</option>
                    <option value="km0">Km 0</option>
                </select>
                <select class="form-select" id="publishedFilter" style="height:40px;width:auto">
                    <option value="">Tutti gli stati</option>
                    <option value="true">Pubblicati</option>
                    <option value="false">Non pubblicati</option>
                </select>
                <select class="form-select" id="nuovoArrivoFilter" style="height:40px;width:auto">
                    <option value="">Tutti</option>
                    <option value="true">Nuovo arrivo</option>
                </select>
                <select class="form-select" id="prontaConsegnaFilter" style="height:40px;width:auto">
                    <option value="">Tutti</option>
                    <option value="true">Pronta consegna</option>
                </select>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Cod.</th>
                            <th>Modello / Versione</th>
                            <th>Cond.</th>
                            <th>Prezzo</th>
                            <th>Stato</th>
                            <th>Badge</th>
                            <th>Inserito</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="vehiclesTableBody">
                        <tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:2.5rem">Caricamento…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info" id="vehiclesPaginationInfo"></span>
                <button class="page-btn" id="vehiclesPrev" disabled>&#8249;</button>
                <button class="page-btn" id="vehiclesNext" disabled>&#8250;</button>
            </div>
        </div>

    </main>
</div>

<!-- ── Brands datalist ────────────────────────────────────────────────────────── -->
<datalist id="brandsList"></datalist>

<!-- ── Vehicle Drawer ─────────────────────────────────────────────────────────── -->
<div class="drawer-overlay" id="vehicleDrawerOverlay"></div>
<aside class="drawer" id="vehicleDrawer" aria-label="Aggiungi / Modifica veicolo">
    <div class="drawer-header">
        <span class="drawer-title" id="vehicleDrawerTitle">Aggiungi veicolo</span>
        <button class="drawer-close" id="vehicleDrawerClose" aria-label="Chiudi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="drawer-body">
        <form id="vehicleForm" style="display:flex;flex-direction:column;gap:20px">

            <div>
                <div class="form-section-title">Dati principali</div>
                <div style="display:flex;flex-direction:column;gap:12px">

                    <div class="form-group">
                        <label class="form-label" for="vBranch">Sede <span style="color:var(--red)">*</span></label>
                        <select class="form-select" id="vBranch" required>
                            <option value="">— Seleziona sede —</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="vType">Tipo</label>
                            <select class="form-select" id="vType" name="vehicleType">
                                <option value="autovettura">Autovettura</option>
                                <option value="motoveicolo">Motoveicolo</option>
                                <option value="autocarro">Autocarro</option>
                                <option value="autocaravan">Autocaravan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="vCondition">Condizione</label>
                            <select class="form-select" id="vCondition" name="condition">
                                <option value="usato">Usato</option>
                                <option value="nuovo">Nuovo</option>
                                <option value="km_0">Km 0</option>
                                <option value="conto_vendita">Conto vendita</option>
                                <option value="epoca">Epoca</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="vInternalCode">Codice interno <span style="color:var(--red)">*</span></label>
                            <input class="form-input" type="text" id="vInternalCode" required placeholder="es. MC-2024-001">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="vTarga">Targa</label>
                            <input class="form-input" type="text" id="vTarga" placeholder="es. AB123CD" style="text-transform:uppercase">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="vBrand">Marca <span style="color:var(--red)">*</span></label>
                            <input class="form-input" type="text" id="vBrand" list="brandsList" required placeholder="es. Volkswagen" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="vModel">Modello <span style="color:var(--red)">*</span></label>
                            <input class="form-input" type="text" id="vModel" required placeholder="es. Golf">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="vVersion">Versione</label>
                        <input class="form-input" type="text" id="vVersion" placeholder="es. 1.5 TSI 130cv Life">
                    </div>

                </div>
            </div>

            <div>
                <div class="form-section-title">Dettagli tecnici</div>
                <div style="display:flex;flex-direction:column;gap:12px">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="vRegYear">Anno imm.</label>
                            <input class="form-input" type="number" id="vRegYear" min="1900" max="2100" placeholder="es. 2022">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="vFuel">Alimentazione</label>
                            <select class="form-select" id="vFuel">
                                <option value="">—</option>
                                <option value="benzina">Benzina</option>
                                <option value="diesel">Diesel</option>
                                <option value="elettrica">Elettrica</option>
                                <option value="ibrida">Ibrida</option>
                                <option value="gpl">GPL</option>
                                <option value="metano">Metano</option>
                                <option value="idrogeno">Idrogeno</option>
                                <option value="altro">Altro</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="vTransmission">Cambio</label>
                            <select class="form-select" id="vTransmission">
                                <option value="">—</option>
                                <option value="manuale">Manuale</option>
                                <option value="automatico">Automatico</option>
                                <option value="semiautomatico">Semiautomatico</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="vHp">Potenza (CV)</label>
                            <input class="form-input" type="number" id="vHp" min="0" placeholder="es. 150">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="vKw">Potenza (kW)</label>
                            <input class="form-input" type="number" id="vKw" min="0" placeholder="es. 110">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="vMileage">Chilometraggio (km)</label>
                            <input class="form-input" type="number" id="vMileage" min="0" value="0" placeholder="es. 45000">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="vColor">Colore</label>
                            <input class="form-input" type="text" id="vColor" placeholder="es. Bianco">
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="form-section-title">Prezzo e visibilità</div>
                <div style="display:flex;flex-direction:column;gap:12px">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="vPrice">Prezzo (€)</label>
                            <input class="form-input" type="number" id="vPrice" min="0" step="100" placeholder="es. 18900">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="vPrevPrice">Prezzo prec. (€)</label>
                            <input class="form-input" type="number" id="vPrevPrice" min="0" step="100">
                        </div>
                        <div class="form-group" id="rentalPriceGroup" style="display:none">
                            <label class="form-label" for="vRentalPrice">Prezzo noleggio (€/mese)</label>
                            <input class="form-input" type="number" id="vRentalPrice" min="0" step="10" placeholder="es. 450">
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:10px">
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="vPublished" checked>
                            <span class="form-check-label">Pubblica sul sito</span>
                        </label>
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="vProntaConsegna">
                            <span class="form-check-label">Pronta consegna</span>
                        </label>
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="vNuovoArrivo">
                            <span class="form-check-label">Nuovo arrivo</span>
                        </label>
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="vVatDeductible">
                            <span class="form-check-label">IVA esposta</span>
                        </label>
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="vImported">
                            <span class="form-check-label">Importata</span>
                        </label>
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="vHandicapAccessible">
                            <span class="form-check-label">Adatta portatori di handicap</span>
                        </label>
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="vForSale" checked>
                            <span class="form-check-label">In vendita</span>
                        </label>
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="vForRental">
                            <span class="form-check-label">In noleggio</span>
                        </label>
                    </div>
                </div>
            </div>

            <div>
                <div class="form-section-title">Descrizione</div>
                <div class="form-group">
                    <textarea class="form-textarea" id="vDescription" placeholder="Descrivi il veicolo, optionals, storia…"></textarea>
                </div>
            </div>

            <!-- Sezione immagini — visibile solo in modifica -->
            <div id="vImagesSection" style="display:none">
                <div class="form-section-title">Immagini</div>

                <!-- Copertina -->
                <div class="form-group">
                    <label class="form-label">Foto di copertina</label>
                    <div class="img-cover-area" id="vCoverArea">
                        <img id="vCoverImg" src="" alt="" style="display:none">
                        <div class="img-cover-placeholder" id="vCoverPlaceholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:32px;height:32px;color:var(--text-light)" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span style="color:var(--text-light);font-size:13px">Nessuna copertina</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:8px">
                        <button type="button" class="btn btn-outline btn-sm" id="vCoverUploadBtn">Carica copertina</button>
                        <button type="button" class="btn btn-outline btn-sm" id="vCoverRemoveBtn" style="display:none;color:var(--red);border-color:var(--red)">Rimuovi</button>
                    </div>
                    <input type="file" id="vCoverInput" accept="image/jpeg,image/png,image/webp" style="display:none">
                </div>

                <!-- Galleria -->
                <div class="form-group">
                    <label class="form-label">Galleria foto</label>
                    <div class="img-gallery-grid" id="vGalleryGrid"></div>
                    <button type="button" class="btn btn-outline btn-sm" id="vGalleryAddBtn" style="margin-top:8px">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Aggiungi foto
                    </button>
                    <input type="file" id="vGalleryInput" accept="image/jpeg,image/png,image/webp" style="display:none" multiple>
                </div>
            </div>

        </form>
    </div>
    <div class="drawer-footer" style="justify-content:space-between">
        <button type="button" class="btn btn-outline" id="vehicleDrawerDelete" style="color:var(--red);border-color:var(--red);display:none">Elimina</button>
        <div style="display:flex;gap:10px">
            <button type="button" class="btn btn-outline" id="vehicleDrawerCancel">Annulla</button>
            <button type="submit" form="vehicleForm" class="btn btn-primary" id="vehicleDrawerSave">Salva veicolo</button>
        </div>
    </div>
</aside>

<!-- ── Push Notify Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="pushModalOverlay"></div>
<div class="modal" id="pushModal" role="dialog" aria-modal="true" aria-labelledby="pushModalLabel">
    <div class="modal-header">
        <span class="modal-title" id="pushModalLabel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            Notifica push — Veicolo
        </span>
        <button class="drawer-close" id="pushModalClose" aria-label="Chiudi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="modal-body">
        <p style="color:var(--text-mid);font-size:14px;margin:0">
            Invia una notifica push ai dispositivi iscritti alle comunicazioni sui veicoli.
        </p>

        <div class="form-group">
            <label class="form-label" for="pnTitle">Titolo notifica</label>
            <input class="form-input" type="text" id="pnTitle" maxlength="100" placeholder="es. Nuovo arrivo: Golf 1.5 TSI">
        </div>

        <div class="form-group">
            <label class="form-label" for="pnBody">Testo notifica</label>
            <textarea class="form-textarea" id="pnBody" rows="3" maxlength="200" placeholder="Breve testo visualizzato nella notifica…" style="resize:none"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Quando inviare</label>
            <div class="pn-toggle" style="margin-top:4px">
                <label>
                    <input type="radio" name="pnWhen" value="now" id="pnNow" checked>
                    <span>Invia ora</span>
                </label>
                <label>
                    <input type="radio" name="pnWhen" value="scheduled" id="pnScheduled">
                    <span>Pianifica</span>
                </label>
            </div>
        </div>

        <div id="pnScheduleFields" style="display:none">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group">
                    <label class="form-label" for="pnDate">Data</label>
                    <input class="form-input" type="date" id="pnDate">
                </div>
                <div class="form-group">
                    <label class="form-label" for="pnTime">Ora</label>
                    <input class="form-input" type="time" id="pnTime" value="09:00">
                </div>
            </div>
        </div>

        <div id="pnResult" style="display:none;padding:10px 14px;border-radius:var(--r-sm);font-size:13px"></div>
    </div>
    <div class="modal-footer">
        <button class="btn btn-outline" id="pushModalSkip">Salta</button>
        <button class="btn btn-primary" id="pushModalSend">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;margin-right:4px" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Invia notifica
        </button>
    </div>
</div>

<script src="/assets/js/admin.js"></script>
<script src="/assets/js/veicoli.js"></script>
</body>
</html>
