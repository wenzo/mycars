<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCars Admin — News &amp; Promozioni</title>
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

<script src="/assets/js/layout-admin.js"></script>

<div class="main-wrapper">
    <header class="topbar">
        <button class="topbar-btn" id="hamburgerBtn" aria-label="Apri menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title">News &amp; Promozioni</h1>
        <div class="topbar-spacer"></div>
        <button class="btn btn-primary btn-sm" id="addNewsBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Aggiungi news
        </button>
    </header>
    <main class="content">

        <div class="card">
            <div class="filter-bar">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="newsSearch" type="text" placeholder="Cerca per titolo…">
                </div>
                <select class="form-select" id="newsTypeFilter" style="height:40px;width:auto">
                    <option value="">Tutti i tipi</option>
                    <option value="generic">Generica</option>
                    <option value="promotion">Promozione</option>
                    <option value="event">Evento</option>
                    <option value="new_arrival">Nuovo Arrivo</option>
                    <option value="financing">Finanziamento</option>
                    <option value="service">Servizio</option>
                </select>
                <select class="form-select" id="newsPublishedFilter" style="height:40px;width:auto">
                    <option value="">Tutti gli stati</option>
                    <option value="true">Pubblicati</option>
                    <option value="false">Bozze</option>
                </select>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Titolo</th>
                            <th>Tipo</th>
                            <th>Stato</th>
                            <th>Dal</th>
                            <th>Al</th>
                            <th>Creato</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="newsTableBody">
                        <tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:2.5rem">Caricamento…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info" id="newsPaginationInfo"></span>
                <button class="page-btn" id="newsPrev" disabled>&#8249;</button>
                <button class="page-btn" id="newsNext" disabled>&#8250;</button>
            </div>
        </div>

    </main>
</div>

<!-- ── News Drawer ──────────────────────────────────────────────────────────── -->
<div class="drawer-overlay" id="newsDrawerOverlay"></div>
<aside class="drawer" id="newsDrawer" aria-label="Aggiungi / Modifica news">
    <div class="drawer-header">
        <span class="drawer-title" id="newsDrawerTitle">Aggiungi news</span>
        <button class="drawer-close" id="newsDrawerClose" aria-label="Chiudi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="drawer-body">
        <form id="newsForm" style="display:flex;flex-direction:column;gap:20px">

            <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group">
                    <label class="form-label" for="nType">Tipo</label>
                    <select class="form-select" id="nType" name="newsType" style="height:40px">
                        <option value="generic">Generica</option>
                        <option value="promotion">Promozione</option>
                        <option value="event">Evento</option>
                        <option value="new_arrival">Nuovo Arrivo</option>
                        <option value="financing">Finanziamento</option>
                        <option value="service">Servizio</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="nCode">Codice (opzionale)</label>
                    <input class="form-control" type="text" id="nCode" name="code" placeholder="es. PROMO24">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="nTitle">Titolo <span style="color:var(--red)">*</span></label>
                <input class="form-control" type="text" id="nTitle" name="title" placeholder="Titolo della news" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="nExcerpt">Sommario</label>
                <textarea class="form-control" id="nExcerpt" name="excerpt" rows="2" placeholder="Breve descrizione visualizzata nelle anteprime" style="resize:vertical"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Corpo (HTML)</label>
                <textarea id="newsBody" name="body"></textarea>
            </div>

            <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group">
                    <label class="form-label" for="nStartsAt">Visibile dal</label>
                    <input class="form-control" type="date" id="nStartsAt" name="startsAt">
                </div>
                <div class="form-group">
                    <label class="form-label" for="nExpiresAt">Scade il</label>
                    <input class="form-control" type="date" id="nExpiresAt" name="expiresAt">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="nLinkUrl">Link esterno</label>
                <input class="form-control" type="url" id="nLinkUrl" name="linkUrl" placeholder="https://…">
            </div>

            <label class="form-check" style="display:flex;align-items:center;gap:10px;cursor:pointer">
                <input type="checkbox" id="nPublished" name="isPublished" style="width:18px;height:18px;accent-color:var(--red)">
                <span class="form-label" style="margin:0">Pubblica subito</span>
            </label>

        </form>
    </div>
    <div class="drawer-footer" style="justify-content:space-between">
        <button type="button" class="btn btn-outline" id="newsDrawerDelete" style="color:var(--red);border-color:var(--red);display:none">Elimina</button>
        <div style="display:flex;gap:10px">
            <button type="button" class="btn btn-outline" id="newsDrawerCancel">Annulla</button>
            <button type="submit" form="newsForm" class="btn btn-primary" id="newsDrawerSave">Salva</button>
        </div>
    </div>
</aside>

<!-- ── Push Notify Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="pushModalOverlay"></div>
<div class="modal" id="pushModal" role="dialog" aria-modal="true" aria-labelledby="pushModalLabel">
    <div class="modal-header">
        <span class="modal-title" id="pushModalLabel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            Notifica push
        </span>
        <button class="drawer-close" id="pushModalClose" aria-label="Chiudi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="modal-body">
        <p style="color:var(--text-mid);font-size:14px;margin:0">
            Invia una notifica push ai dispositivi iscritti per questa news.
        </p>

        <div class="form-group">
            <label class="form-label" for="pnTitle">Titolo notifica</label>
            <input class="form-input" type="text" id="pnTitle" maxlength="100" placeholder="es. Novità in concessionaria">
        </div>

        <div class="form-group">
            <label class="form-label" for="pnBody">Testo notifica</label>
            <textarea class="form-textarea" id="pnBody" rows="3" maxlength="200" placeholder="Breve testo visualizzato nella notifica…" style="resize:none"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Quando inviare</label>
            <div class="pn-toggle" style="margin-top:4px">
                <label>
                    <input type="radio" name="pnWhen" value="now" id="pnNow" checked>
                    <span>Invia ora</span>
                </label>
                <label>
                    <input type="radio" name="pnWhen" value="scheduled" id="pnScheduled">
                    <span>Pianifica</span>
                </label>
            </div>
        </div>

        <div id="pnScheduleFields" style="display:none">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group">
                    <label class="form-label" for="pnDate">Data</label>
                    <input class="form-input" type="date" id="pnDate">
                </div>
                <div class="form-group">
                    <label class="form-label" for="pnTime">Ora</label>
                    <input class="form-input" type="time" id="pnTime" value="09:00">
                </div>
            </div>
        </div>

        <div id="pnResult" style="display:none;padding:10px 14px;border-radius:var(--r-sm);font-size:13px"></div>
    </div>
    <div class="modal-footer">
        <button class="btn btn-outline" id="pushModalSkip">Salta</button>
        <button class="btn btn-primary" id="pushModalSend">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;margin-right:4px" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Invia notifica
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js"></script>
<script src="/assets/js/admin.js"></script>
<script src="/assets/js/news.js"></script>
</body>
</html>
