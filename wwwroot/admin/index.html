<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCars Admin — Dashboard</title>
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

<script src="/assets/js/layout-admin.js"></script>

<div class="main-wrapper">

    <header class="topbar">
        <button class="topbar-btn" id="hamburgerBtn" aria-label="Apri menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title">Dashboard</h1>
        <div class="topbar-spacer"></div>
        <span class="topbar-date" id="topbarDate"></span>
        <button class="topbar-btn" aria-label="Notifiche">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
    </header>

    <main class="content">

        <!-- Stats grid -->
        <section class="stats-grid" aria-label="Statistiche">

            <div class="stat-card stat-navy">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17" r="1.5"/><circle cx="16.5" cy="17" r="1.5"/></svg>
                </div>
                <div class="stat-body">
                    <span class="stat-label">Veicoli attivi</span>
                    <span class="stat-value" data-stat="veicoli_attivi">—</span>
                </div>
            </div>

            <div class="stat-card stat-amber">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </div>
                <div class="stat-body">
                    <span class="stat-label">Nuovi arrivi</span>
                    <span class="stat-value" data-stat="nuovi_arrivi">—</span>
                </div>
            </div>

            <div class="stat-card stat-green">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="stat-body">
                    <span class="stat-label">Pronta consegna</span>
                    <span class="stat-value" data-stat="pronta_consegna">—</span>
                </div>
            </div>

            <div class="stat-card stat-red">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div class="stat-body">
                    <span class="stat-label">Lead aperti</span>
                    <span class="stat-value" data-stat="lead_aperti">—</span>
                </div>
            </div>

            <div class="stat-card stat-blue">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="stat-body">
                    <span class="stat-label">Test drive</span>
                    <span class="stat-value" data-stat="test_drive">—</span>
                </div>
            </div>

            <div class="stat-card stat-indigo">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2z"/><path d="M3 10h18"/></svg>
                </div>
                <div class="stat-body">
                    <span class="stat-label">News pubblicate</span>
                    <span class="stat-value" data-stat="news_pubblicate">—</span>
                </div>
            </div>

        </section>

        <!-- Two-column row: leads + vehicles -->
        <div class="two-col">

            <!-- Recent leads -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Ultimi lead</h2>
                    <a href="/admin/lead.html" class="btn btn-outline btn-sm">Vedi tutti</a>
                </div>
                <div class="card-body card-body-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Veicolo</th>
                                <th>Tipo</th>
                                <th>Stato</th>
                                <th>Data</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="leadsTableBody">
                            <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem">Caricamento…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <!-- Recent vehicles -->
        <div class="card" style="margin-top:0">
            <div class="card-header">
                <h2 class="card-title">Ultimi veicoli inseriti</h2>
                <a href="/admin/veicoli.html" class="btn btn-outline btn-sm">Vedi tutti</a>
            </div>
            <div class="card-body card-body-table">
                <table>
                    <thead>
                        <tr>
                            <th>Veicolo</th>
                            <th>Badge</th>
                            <th>Prezzo</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="vehiclesList">
                        <tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem">Caricamento…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<script src="/assets/js/admin.js"></script>
<script>
(function () {
    const dateEl = document.getElementById('topbarDate');
    if (dateEl) {
        dateEl.textContent = new Date().toLocaleDateString('it-IT', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        });
    }
})();
</script>
</body>
</html>
