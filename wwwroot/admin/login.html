<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCars Admin — Accesso</title>
    <link rel="stylesheet" href="/assets/css/admin.css">
    <style>
        body.login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, #1e3a5f 100%);
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
                <rect width="40" height="40" rx="10" fill="var(--red)"/>
                <path d="M8 26 L14 14 L20 22 L26 14 L32 26" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="20" cy="12" r="3" fill="#fff"/>
            </svg>
        </div>
        <h1 class="login-title">MyCars Admin</h1>
        <p class="login-subtitle">Accedi al pannello di controllo</p>

        <form class="login-form" id="loginForm" method="post" action="/api/admin/login" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input
                    class="form-input"
                    type="email"
                    id="email"
                    name="email"
                    autocomplete="email"
                    required
                    autofocus
                    placeholder="nome@concessionaria.it"
                >
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input
                    class="form-input"
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    placeholder="••••••••"
                >
            </div>

            <div class="login-error" id="loginError" role="alert" hidden></div>

            <button type="submit" class="login-submit" id="submitBtn">
                <span id="submitLabel">Accedi</span>
                <span id="submitSpinner" hidden>Accesso in corso…</span>
            </button>
        </form>
    </div>

    <script>
    (function () {
        const form    = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        const label   = document.getElementById('submitLabel');
        const spinner = document.getElementById('submitSpinner');
        const btn     = document.getElementById('submitBtn');

        // Show error from query string (e.g. ?error=invalid)
        const params = new URLSearchParams(location.search);
        if (params.get('error') === 'invalid') {
            showError('Credenziali non valide. Riprova.');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            setLoading(true);

            const body = new URLSearchParams(new FormData(form));

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body.toString(),
                    credentials: 'same-origin',
                });

                if (res.redirected) {
                    location.href = res.url;
                    return;
                }
                if (res.ok) {
                    location.href = '/admin/index.html';
                    return;
                }

                const data = await res.json().catch(() => null);
                showError(data?.message ?? 'Credenziali non valide. Riprova.');
            } catch {
                showError('Errore di rete. Controlla la connessione.');
            } finally {
                setLoading(false);
            }
        });

        function setLoading(on) {
            btn.disabled = on;
            label.hidden = on;
            spinner.hidden = !on;
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.hidden = false;
        }

        function clearError() {
            errorEl.hidden = true;
            errorEl.textContent = '';
        }
    })();
    </script>
</body>
</html>
