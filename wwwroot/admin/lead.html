<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCars Admin — Lead &amp; Richieste</title>
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

<script src="/assets/js/layout-admin.js"></script>

<div class="main-wrapper">
    <header class="topbar">
        <button class="topbar-btn" id="hamburgerBtn" aria-label="Apri menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title">Lead &amp; Richieste</h1>
        <div class="topbar-spacer"></div>
    </header>
    <main class="content">

        <div class="card">
            <div class="filter-bar">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="leadSearch" type="text" placeholder="Cerca per nome, email…">
                </div>
                <select class="form-select" id="leadTypeFilter" style="height:40px;width:auto">
                    <option value="">Tutti i tipi</option>
                    <option value="info">Info</option>
                    <option value="test_drive">Test Drive</option>
                    <option value="offer">Offerta</option>
                    <option value="financing">Finanziamento</option>
                </select>
            </div>
            <div class="filter-tabs" id="leadStatusTabs">
                <button class="filter-tab active" data-status="">Tutti</button>
                <button class="filter-tab" data-status="new">Nuovi</button>
                <button class="filter-tab" data-status="contacted">Contattati</button>
                <button class="filter-tab" data-status="closed">Chiusi</button>
                <button class="filter-tab" data-status="lost">Persi</button>
                <button class="filter-tab" data-status="spam">Spam</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Email / Tel</th>
                            <th>Tipo</th>
                            <th>Stato</th>
                            <th>Data</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="leadsTableBody">
                        <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2.5rem">Caricamento…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info" id="leadsPaginationInfo"></span>
                <button class="page-btn" id="leadsPrev" disabled>&#8249;</button>
                <button class="page-btn" id="leadsNext" disabled>&#8250;</button>
            </div>
        </div>

    </main>
</div>

<script src="/assets/js/admin.js"></script>
<script src="/assets/js/lead.js"></script>
</body>
</html>
